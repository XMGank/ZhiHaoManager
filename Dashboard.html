<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智耗管家 - 振武医院耗材筛选统计系统</title>
    <script src="AgentSettings.js"></script>
    <script src="DashboardData.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        :root {
            --bg: #f6f8fb;
            --surface: #ffffff;
            --surface-soft: #f8fafc;
            --text: #0f172a;
            --muted: #64748b;
            --line: #d7dee8;
            --blue: #2563eb;
            --indigo: #4f46e5;
            --green: #059669;
            --amber: #d97706;
            --rose: #e11d48;
            --shadow: 0 14px 38px rgba(15, 23, 42, 0.08);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: "Microsoft YaHei UI", "Microsoft YaHei", Arial, sans-serif;
            font-size: 14px;
            line-height: 1.5;
        }

        button, input, select {
            font: inherit;
        }

        .app {
            width: min(1440px, calc(100vw - 40px));
            margin: 0 auto;
            padding: 24px 0 38px;
        }

        .app-header {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 24px;
            margin-bottom: 18px;
        }

        .brand h1 {
            margin: 0;
            font-size: 28px;
            line-height: 1.2;
            font-weight: 800;
            color: var(--text);
        }

        .brand p {
            margin: 6px 0 0;
            color: var(--muted);
            font-size: 14px;
        }

        .meta {
            min-width: 280px;
            padding: 12px 14px;
            border: 1px solid var(--line);
            background: var(--surface);
            border-radius: 8px;
            color: var(--muted);
            box-shadow: 0 6px 18px rgba(15, 23, 42, 0.05);
        }

        .board {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 8px;
            box-shadow: var(--shadow);
            padding: 20px;
        }

        .board + .board {
            margin-top: 28px;
        }

        .board-heading {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 18px;
            margin-bottom: 16px;
        }

        .board-title {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 0;
        }

        .accent {
            width: 4px;
            height: 22px;
            border-radius: 2px;
            background: var(--blue);
        }

        .accent.indigo { background: var(--indigo); }

        h2 {
            margin: 0;
            font-size: 18px;
            line-height: 1.25;
            font-weight: 800;
        }

        .controls {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .field {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--surface-soft);
            color: var(--muted);
            white-space: nowrap;
        }

        .field input, .field select {
            border: 0;
            outline: 0;
            background: transparent;
            color: var(--text);
            min-width: 148px;
        }

        .field select {
            min-width: 260px;
            cursor: pointer;
        }

        .field.checkbox-field {
            cursor: pointer;
        }

        .field.checkbox-field input {
            width: 16px;
            min-width: 16px;
            height: 16px;
            margin: 0;
        }

        .hint {
            color: var(--muted);
            font-size: 12px;
        }

        .metrics {
            display: grid;
            grid-template-columns: repeat(5, minmax(140px, 1fr));
            gap: 12px;
            margin: 14px 0 18px;
        }

        .metric {
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--surface-soft);
            padding: 12px 14px;
            min-height: 74px;
        }

        .metric span {
            display: block;
            color: var(--muted);
            font-size: 12px;
        }

        .metric strong {
            display: block;
            margin-top: 5px;
            font-size: 23px;
            line-height: 1.15;
            font-weight: 800;
        }

        .metric.in strong { color: var(--green); }
        .metric.out strong { color: var(--amber); }
        .metric.return strong { color: var(--rose); }
        .metric.surplus strong { color: var(--blue); }

        .table-wrap {
            border: 1px solid var(--line);
            border-radius: 8px;
            overflow: auto;
            max-height: 520px;
            background: var(--surface);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            white-space: nowrap;
        }

        th, td {
            padding: 11px 12px;
            border-bottom: 1px solid #e8edf4;
            text-align: left;
            vertical-align: middle;
        }

        th {
            position: sticky;
            top: 0;
            z-index: 1;
            background: #eef3f8;
            color: #334155;
            font-size: 13px;
            font-weight: 800;
        }

        .hide-batch .batch-cell {
            display: none;
        }

        tbody tr:hover {
            background: #f7fbff;
        }

        .num {
            text-align: right;
            font-variant-numeric: tabular-nums;
        }

        .name-cell {
            font-weight: 700;
            color: var(--text);
        }

        .empty-name {
            color: #94a3b8;
            font-style: italic;
            font-weight: 600;
        }

        .table-note {
            margin: 10px 0 0;
            color: var(--muted);
            font-size: 12px;
        }

        .agent-box {
            margin-top: 16px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--surface-soft);
            overflow: hidden;
        }

        .agent-toggle {
            width: 100%;
            min-height: 46px;
            padding: 11px 14px;
            border: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: transparent;
            color: var(--text);
            cursor: pointer;
            font-weight: 800;
        }

        .agent-toggle:hover {
            background: #eef5ff;
        }

        .agent-label {
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .bolt {
            width: 20px;
            height: 20px;
            display: inline-grid;
            place-items: center;
            border-radius: 6px;
            background: #dbeafe;
            color: var(--blue);
            font-size: 13px;
        }

        .chevron {
            transition: transform 0.2s ease;
            color: var(--muted);
        }

        .agent-box.expanded .chevron {
            transform: rotate(180deg);
        }

        .agent-body {
            display: none;
            padding: 0 16px 16px;
            color: #334155;
        }

        .agent-box.expanded .agent-body {
            display: block;
        }

        .agent-body-inner {
            border-top: 1px solid #e2e8f0;
            padding-top: 13px;
        }

        .agent-body ul {
            margin: 0;
            padding-left: 20px;
        }

        .agent-body li + li {
            margin-top: 6px;
        }

        .api-note {
            margin-top: 12px;
            padding: 10px 12px;
            border-radius: 8px;
            background: #eff6ff;
            color: #1d4ed8;
        }

        .splitter {
            border: 0;
            border-top: 2px dashed #cbd5e1;
            margin: 30px 0;
        }

        .charts {
            display: grid;
            grid-template-columns: minmax(0, 1fr);
            gap: 14px;
        }

        .chart-panel {
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 14px;
            background: var(--surface);
        }

        .chart-title {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: center;
            margin-bottom: 8px;
            color: #334155;
            font-weight: 800;
        }

        .chart {
            width: 100%;
            height: 310px;
        }

        #surplusChart {
            height: 260px;
        }

        .empty-state {
            padding: 42px 16px;
            text-align: center;
            color: var(--muted);
        }

        @media (max-width: 980px) {
            .app {
                width: min(100% - 24px, 1440px);
                padding-top: 16px;
            }

            .app-header,
            .board-heading {
                align-items: flex-start;
                flex-direction: column;
            }

            .meta {
                width: 100%;
                min-width: 0;
            }

            .metrics {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .field,
            .field input,
            .field select {
                width: 100%;
                min-width: 0;
            }

            .controls {
                width: 100%;
            }
        }

        @media (max-width: 560px) {
            .metrics {
                grid-template-columns: 1fr;
            }

            .board {
                padding: 14px;
            }

            .brand h1 {
                font-size: 23px;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <header class="app-header">
            <div class="brand">
                <h1>智耗管家</h1>
                <p>振武医院耗材筛选统计系统</p>
            </div>
            <div class="meta" id="dataMeta">等待上传器生成 DashboardData.js。</div>
        </header>

        <section class="board" aria-labelledby="ledgerTitle">
            <div class="board-heading">
                <div class="board-title">
                    <span class="accent"></span>
                    <h2 id="ledgerTitle">各卫材 / 规格 / 批号明细台账</h2>
                </div>
                <div class="controls">
                    <label class="field">
                        <span>开始日期</span>
                        <input type="date" id="startDate">
                    </label>
                    <label class="field">
                        <span>结束日期</span>
                        <input type="date" id="endDate">
                    </label>
                    <label class="field">
                        <span>卫材名称</span>
                        <select id="ledgerMaterialSelect"></select>
                    </label>
                    <label class="field checkbox-field">
                        <input type="checkbox" id="ledgerShowBatch" checked>
                        <span>显示批号</span>
                    </label>
                    <label class="field checkbox-field">
                        <input type="checkbox" id="ledgerSpecSort">
                        <span>规格排序</span>
                    </label>
                </div>
            </div>

            <div class="metrics" aria-label="统计概览">
                <div class="metric in">
                    <span>入库数量</span>
                    <strong id="metricInbound">0</strong>
                </div>
                <div class="metric out">
                    <span>发药数量</span>
                    <strong id="metricDispense">0</strong>
                </div>
                <div class="metric return">
                    <span>退药数量</span>
                    <strong id="metricReturn">0</strong>
                </div>
                <div class="metric surplus">
                    <span>盈余数量</span>
                    <strong id="metricSurplus">0</strong>
                </div>
                <div class="metric">
                    <span>明细组合</span>
                    <strong id="metricRows">0</strong>
                </div>
            </div>

            <div class="table-wrap">
                <table id="ledgerTable">
                    <thead>
                        <tr>
                            <th>月份</th>
                            <th>名称</th>
                            <th>规格</th>
                            <th class="batch-cell">批号</th>
                            <th class="num">入库</th>
                            <th class="num">发药</th>
                            <th class="num">退药</th>
                            <th class="num">盈余</th>
                        </tr>
                    </thead>
                    <tbody id="ledgerBody">
                        <tr><td colspan="8" class="empty-state">暂无数据</td></tr>
                    </tbody>
                </table>
            </div>
            <div class="table-note" id="ledgerNote"></div>

            <div class="agent-box expanded" id="globalAgentBox">
                <button class="agent-toggle" type="button" data-target="globalAgentBox" aria-expanded="true">
                    <span class="agent-label"><span class="bolt">A</span>全局台账 Agent 洞察</span>
                    <span class="chevron">⌄</span>
                </button>
                <div class="agent-body">
                    <div class="agent-body-inner" id="globalAgentBody"></div>
                </div>
            </div>
        </section>

        <hr class="splitter">

        <section class="board" aria-labelledby="trendTitle">
            <div class="board-heading">
                <div class="board-title">
                    <span class="accent indigo"></span>
                    <h2 id="trendTitle">单品盈余与流转趋势</h2>
                </div>
                <div class="controls">
                    <label class="field">
                        <span>卫材名称</span>
                        <select id="materialSelect"></select>
                    </label>
                </div>
            </div>

            <div class="charts">
                <div class="chart-panel">
                    <div class="chart-title">
                        <span>月度流转数量</span>
                        <span class="hint">柱状图：入库、发药、退药</span>
                    </div>
                    <div id="flowChart" class="chart"></div>
                </div>
                <div class="chart-panel">
                    <div class="chart-title">
                        <span>盈余趋势</span>
                        <span class="hint">折线图：按流水推算的累计盈余</span>
                    </div>
                    <div id="surplusChart" class="chart"></div>
                </div>
            </div>

            <div class="agent-box expanded" id="trendAgentBox">
                <button class="agent-toggle" type="button" data-target="trendAgentBox" aria-expanded="true">
                    <span class="agent-label"><span class="bolt">A</span>Agent 单品趋势分析</span>
                    <span class="chevron">⌄</span>
                </button>
                <div class="agent-body">
                    <div class="agent-body-inner" id="trendAgentBody"></div>
                </div>
            </div>
        </section>
    </div>

    <script>
        (function () {
            var dashboardData = window.ZHIHAO_DASHBOARD_DATA || { rows: [] };
            var agentSettings = window.ZHIHAO_AGENT_SETTINGS || {};
            var rows = normalizeRows(dashboardData.rows || []);
            var flowChart = null;
            var surplusChart = null;
            var agentSystemPrompt = [
                "你是一个专业的“医院耗材数据分析专家”。你的任务是根据提供的结构化医疗耗材流转数据，进行深度的业务诊断。",
                "请严格遵守以下规则：",
                "- 只允许基于用户提供的数据进行分析，绝对禁止编造、伪造或猜测未提供的数据。",
                "- 你的语言必须精炼、客观、专业，不要使用任何寒暄或废话。",
                "- 必须先基于 payload.items 复述计算后的实际盈余数据，再给出趋势、预测或管理判断。",
                "- 没有断供风险或库存积压时，也要基于实际盈余、消耗速度、可用天数和趋势给出客观结论；不要只输出“未见明显异常”。"
            ].join("\n");
            var replenishmentTaskPrompt = [
                "【输入数据】",
                "以下是本周期内重点卫材的进销存聚合数据（JSON 格式），由 payload.items、payload.totals、payload.rows 提供。payload.items 是系统已计算好的重点指标，必须优先使用。",
                "",
                "【分析任务】",
                "请你对上述耗材的盈余与补货情况进行深度分析。请按照以下思考步骤执行：",
                "步骤1（实际盈余）：逐项列出 item_name、spec、batch、current_surplus、period_dispense、period_avg_daily_consumption、estimated_days_to_depletion。current_surplus <= 0 时必须表述为“当前已透支/已耗尽，预计可用 0 天”，不得输出负数耗尽天数。",
                "步骤2（趋势与预测）：结合 latest_month、latest_month_dispense、surplus_change_from_previous_month、period_avg_daily_consumption 判断盈余是在改善、恶化还是稳定；可以给出短期预测，但必须说明依据来自 payload.items 或 payload.rows。",
                "步骤3（异常定位）：找出预计耗尽天数低于 7 天、当前盈余小于等于 0 的断供风险耗材；对高盈余且低消耗或无消耗的耗材标记库存积压。不得使用输入数据之外的入库周期、消耗量或阈值。",
                "步骤4（行动建议）：针对发现的问题给出采购、调拨、清库或复核建议。没有明显风险时，也要给出维持观察、复核消耗口径或设置安全库存的建议。",
                "",
                "【输出格式约束】",
                "你必须且只能以 JSON 格式输出，不要包含 Markdown 标记或额外文本。所有文本字段必须是完整、规范、可直接展示的中文句子。JSON 结构如下：",
                "禁止把 JSON 字符串放入 summary；summary 只能是普通中文判断句。",
                "{",
                "  \"summary\": \"一句话概括整体库存健康度，必须包含实际盈余和消耗趋势的判断\",",
                "  \"actual_surplus\": [",
                "    {",
                "      \"item_name\": \"卫材名称\",",
                "      \"spec\": \"规格\",",
                "      \"batch\": \"批号\",",
                "      \"sentence\": \"先给出实际盈余、周期消耗、日均消耗和预计可用天数的规范句子\"",
                "    }",
                "  ],",
                "  \"analysis\": [",
                "    \"趋势、预测或管理判断的规范句子，必须有数据依据\"",
                "  ],",
                "  \"warnings\": [",
                "    {",
                "      \"item_name\": \"卫材名称\",",
                "      \"issue_type\": \"断供风险\" 或 \"库存积压\",",
                "      \"description\": \"具体的问题描述与数据支撑\",",
                "      \"recommendation\": \"具体的管理建议\"",
                "    }",
                "  ]",
                "}"
            ].join("\n");

            var els = {
                dataMeta: document.getElementById("dataMeta"),
                startDate: document.getElementById("startDate"),
                endDate: document.getElementById("endDate"),
                metricInbound: document.getElementById("metricInbound"),
                metricDispense: document.getElementById("metricDispense"),
                metricReturn: document.getElementById("metricReturn"),
                metricSurplus: document.getElementById("metricSurplus"),
                metricRows: document.getElementById("metricRows"),
                ledgerTable: document.getElementById("ledgerTable"),
                ledgerBody: document.getElementById("ledgerBody"),
                ledgerNote: document.getElementById("ledgerNote"),
                ledgerMaterialSelect: document.getElementById("ledgerMaterialSelect"),
                ledgerShowBatch: document.getElementById("ledgerShowBatch"),
                ledgerSpecSort: document.getElementById("ledgerSpecSort"),
                materialSelect: document.getElementById("materialSelect"),
                globalAgentBody: document.getElementById("globalAgentBody"),
                trendAgentBody: document.getElementById("trendAgentBody")
            };

            function init() {
                bindEvents();
                initDateInputs();
                initMaterialSelect();
                renderAll();
            }

            function bindEvents() {
                els.startDate.addEventListener("change", renderAll);
                els.endDate.addEventListener("change", renderAll);
                els.ledgerMaterialSelect.addEventListener("change", renderAll);
                els.ledgerShowBatch.addEventListener("change", renderAll);
                els.ledgerSpecSort.addEventListener("change", renderAll);
                els.materialSelect.addEventListener("change", renderTrend);

                Array.prototype.forEach.call(document.querySelectorAll(".agent-toggle"), function (button) {
                    button.addEventListener("click", function () {
                        var target = document.getElementById(button.getAttribute("data-target"));
                        if (!target) return;
                        target.classList.toggle("expanded");
                        button.setAttribute("aria-expanded", target.classList.contains("expanded") ? "true" : "false");
                    });
                });

                window.addEventListener("resize", function () {
                    if (flowChart) flowChart.resize();
                    if (surplusChart) surplusChart.resize();
                });
            }

            function initDateInputs() {
                if (!rows.length) {
                    els.dataMeta.textContent = "未检测到看板数据，请先在上传器中点击“分析”。";
                    return;
                }

                var minDate = dashboardData.minDate || rows[0].monthDate;
                var maxDate = dashboardData.defaultEndDate || addMonths(maxBy(rows, "monthDate").monthDate, 1);
                els.startDate.min = minDate;
                els.startDate.max = maxDate;
                els.endDate.min = minDate;
                els.endDate.max = maxDate;
                els.startDate.value = minDate;
                els.endDate.value = maxDate;
                els.ledgerSpecSort.checked = Boolean(dashboardData.defaultSpecSort);

                els.dataMeta.innerHTML = [
                    "生成时间：", escapeHtml(dashboardData.generatedAt || "未知"),
                    "<br>数据月份：", escapeHtml(minDate.slice(0, 7)), " 至 ", escapeHtml(addMonths(maxDate, -1).slice(0, 7)),
                    "<br>明细组合：", formatNumber(rows.length)
                ].join("");
            }

            function initMaterialSelect() {
                var names = unique(rows.map(function (row) { return row.name; })).sort(localeSort);
                var hasEmpty = names.indexOf("") >= 0;
                els.ledgerMaterialSelect.innerHTML = "";
                els.materialSelect.innerHTML = "";
                appendOption(els.ledgerMaterialSelect, "__all__", "所有卫材");
                appendOption(els.materialSelect, "__all__", "所有卫材");
                if (hasEmpty) {
                    appendOption(els.ledgerMaterialSelect, "__empty__", "(空名称)");
                    appendOption(els.materialSelect, "__empty__", "(空名称)");
                }
                names.forEach(function (name) {
                    if (name !== "") {
                        appendOption(els.ledgerMaterialSelect, name, name);
                        appendOption(els.materialSelect, name, name);
                    }
                });
            }

            function appendOption(select, value, text) {
                var option = document.createElement("option");
                option.value = value;
                option.textContent = text;
                select.appendChild(option);
            }

            function renderAll() {
                var filtered = getFilteredRows();
                var ledgerRows = getLedgerRows(filtered);
                renderSummary(ledgerRows);
                renderLedger(ledgerRows);
                renderAgentPanel(els.globalAgentBody, getLedgerScopeLabel(), ledgerRows);
                renderTrend();
            }

            function renderTrend() {
                var filtered = aggregateLedgerRows(getTrendRows(getFilteredRows()), true);
                renderCharts(filtered);
                var selected = els.materialSelect.value;
                var label = selected === "__all__" ? "所有卫材" : selected === "__empty__" ? "(空名称)" : selected;
                renderAgentPanel(els.trendAgentBody, label + "趋势", filtered);
            }

            function getFilteredRows() {
                if (!rows.length) return [];
                var start = els.startDate.value ? new Date(els.startDate.value + "T00:00:00") : null;
                var end = els.endDate.value ? new Date(els.endDate.value + "T00:00:00") : null;
                return rows.filter(function (row) {
                    var date = new Date(row.monthDate + "T00:00:00");
                    return (!start || date >= start) && (!end || date < end);
                });
            }

            function getTrendRows(baseRows) {
                var selected = els.materialSelect.value;
                if (selected === "__all__") return baseRows;
                if (selected === "__empty__") {
                    return baseRows.filter(function (row) { return row.name === ""; });
                }
                return baseRows.filter(function (row) { return row.name === selected; });
            }

            function getLedgerRows(baseRows) {
                var selected = els.ledgerMaterialSelect.value;
                var filtered = baseRows;
                if (selected === "__empty__") {
                    filtered = baseRows.filter(function (row) { return row.name === ""; });
                } else if (selected && selected !== "__all__") {
                    filtered = baseRows.filter(function (row) { return row.name === selected; });
                }

                return aggregateLedgerRows(filtered, els.ledgerShowBatch.checked, els.ledgerSpecSort.checked);
            }

            function getLedgerScopeLabel() {
                var selected = els.ledgerMaterialSelect.value;
                var label = selected === "__all__" ? "全局台账" : selected === "__empty__" ? "(空名称)台账" : selected + "台账";
                if (!els.ledgerShowBatch.checked) label += "（批号合并）";
                if (els.ledgerSpecSort.checked) label += "（规格排序）";
                return label;
            }

            function aggregateLedgerRows(baseRows, includeBatch, sortBySpec) {
                var map = {};
                baseRows.forEach(function (row) {
                    var key = [row.month, row.name, row.spec, includeBatch ? row.batch : ""].join("\u001f");
                    if (!map[key]) {
                        map[key] = {
                            month: row.month,
                            monthDate: row.monthDate,
                            name: row.name,
                            spec: row.spec,
                            batch: includeBatch ? row.batch : "",
                            inbound: 0,
                            dispense: 0,
                            returnQty: 0,
                            surplus: 0
                        };
                    }
                    map[key].inbound += row.inbound;
                    map[key].dispense += row.dispense;
                    map[key].returnQty += row.returnQty;
                });

                var aggregated = sortLedgerRows(Object.keys(map).map(function (key) { return map[key]; }), sortBySpec);
                return recalculateRunningSurplus(aggregated, includeBatch);
            }

            function sortLedgerRows(ledgerRows, sortBySpec) {
                return ledgerRows.sort(function (a, b) {
                    var result = 0;
                    if (sortBySpec) {
                        result = localeSort(a.spec, b.spec);
                        if (result) return result;
                        result = localeSort(a.name, b.name);
                        if (result) return result;
                        result = localeSort(a.batch, b.batch);
                        if (result) return result;
                        return a.month.localeCompare(b.month);
                    }
                    result = a.month.localeCompare(b.month);
                    if (result) return result;
                    result = localeSort(a.name, b.name);
                    if (result) return result;
                    result = localeSort(a.spec, b.spec);
                    if (result) return result;
                    return localeSort(a.batch, b.batch);
                });
            }

            function recalculateRunningSurplus(aggregatedRows, includeBatch) {
                var groups = {};
                aggregatedRows.forEach(function (row) {
                    var key = [row.name, row.spec, includeBatch ? row.batch : ""].join("\u001f");
                    if (!groups[key]) groups[key] = [];
                    groups[key].push(row);
                });

                Object.keys(groups).forEach(function (key) {
                    var group = groups[key].sort(function (a, b) { return a.month.localeCompare(b.month); });
                    var running = 0;
                    var previousMonth = "";
                    group.forEach(function (row) {
                        if (previousMonth && row.month !== addMonths(previousMonth + "-01", 1).slice(0, 7)) {
                            running = 0;
                        }
                        running += row.inbound - row.dispense + row.returnQty;
                        row.surplus = round2(running);
                        previousMonth = row.month;
                    });
                });

                return aggregatedRows;
            }

            function renderSummary(filtered) {

                els.metricInbound.textContent = formatNumber(totals.inbound);
                els.metricDispense.textContent = formatNumber(totals.dispense);

                els.metricSurplus.textContent = formatNumber(totals.surplus);
                els.metricRows.textContent = formatNumber(filtered.length);
            }

            function renderLedger(filtered) {

                        "<td class=\"num\">", formatNumber(row.inbound), "</td>",

                    ].join("");

                els.ledgerNote.textContent = filtered.length > limit

                    : "已显示 " + filtered.length + " 行。" + (includeBatch ? "" : " 已按同一月份、名称、规格合并批号。");
            }

            function renderCharts(filtered) {
                var series = aggregateByMonth(filtered);
                if (!window.echarts) {
                    document.getElementById("flowChart").innerHTML = "<div class=\"empty-state\">ECharts 未加载，无法显示柱状图。</div>";
                    document.getElementById("surplusChart").innerHTML = "<div class=\"empty-state\">ECharts 未加载，无法显示折线图。</div>";

                    grid: { top: 46, left: 58, right: 22, bottom: 42 },
                    xAxis: { type: "category", data: series.months, axisTick: { alignWithLabel: true } },
                    yAxis: { type: "value", name: "数量", splitLine: { lineStyle: { color: "#edf2f7" } } },
                    series: [
                        { name: "入库", type: "bar", barMaxWidth: 24, data: series.inbound },
                        { name: "发药", type: "bar", barMaxWidth: 24, data: series.dispense },

                    ]
                }, true);

                surplusChart.setOption({

                    yAxis: { type: "value", name: "累计盈余", splitLine: { lineStyle: { color: "#edf2f7" } } },
                    series: [
                        {

                            type: "line",
                            smooth: true,
                            symbolSize: 8,

                        }

            }

            function renderAgentPanel(container, scope, scopedRows) {
                var version = (Number(container.getAttribute("data-agent-version")) || 0) + 1;
                container.setAttribute("data-agent-version", String(version));

                if (!agentSettings.enabled || !agentSettings.endpoint) {
                    container.innerHTML = buildLocalInsightHtml(scope, scopedRows) + buildApiNote("本地规则洞察已生成。");
                    return;
                }

                container.innerHTML = buildApiNote("正在请求外部 Agent 分析...");
                requestExternalAgent(scope, scopedRows).then(function (html) {
                    if (String(version) !== container.getAttribute("data-agent-version")) return;
                    container.innerHTML = buildApiNote("外部 Agent 返回：") + html;
                }).catch(function (error) {
                    if (String(version) !== container.getAttribute("data-agent-version")) return;
                    container.innerHTML = buildApiNote("外部 Agent 请求失败：" + escapeHtml(error.message));
                });
            }

            function buildLocalInsightHtml(scope, scopedRows) {
                if (!scopedRows.length) {
                    return "<p>当前范围没有可分析数据。</p>";
                }

                var totals = summarize(scopedRows);
                var monthly = aggregateByMonth(scopedRows);
                var anomalies = findAnomalies(scopedRows);
                var bullets = [];

                bullets.push(scope + "内入库 " + formatNumber(totals.inbound) + "，发药 " + formatNumber(totals.dispense) + "，退药 " + formatNumber(totals.returnQty) + "，本期盈余 " + formatNumber(totals.surplus) + "。");

                if (monthly.dispense.length >= 3) {
                    var stats = meanAndStd(monthly.dispense);
                    if (stats.mean > 0 && stats.std / stats.mean < 0.25) {
                        bullets.push("发药序列波动较小，存在较稳定的月度消耗周期，适合用近 3 个月均值做补货阈值。");
                    } else if (stats.mean > 0) {
                        bullets.push("发药序列波动较大，建议按规格和批号拆开复核科室领用或集中消耗月份。");
                    }
                } else {
                    bullets.push("可用月份不足 3 个，周期性判断仅作为初筛。");
                }

                if (anomalies.length) {
                    anomalies.slice(0, 5).forEach(function (item) {
                        bullets.push("补货提醒：" + item.label + " 的累计盈余最近斜率异常下降，最近月净变化 " + formatNumber(item.lastSlope) + "，低于前期均值 " + formatNumber(item.previousAverage) + "。");
                    });
                } else {
                    bullets.push("未发现明显的盈余曲线异常下滑组合；仍建议对高频发药规格设置人工安全库存。");
                }

                return "<ul>" + bullets.map(function (text) { return "<li>" + escapeHtml(text) + "</li>"; }).join("") + "</ul>";
            }

            function requestExternalAgent(scope, scopedRows) {
                var payload = {
                    task: "盈余与补货预警：基于提供数据计算预计耗尽天数，识别断供风险和库存积压，仅输出结构化结论。",
                    systemPrompt: agentSystemPrompt,
                    taskPrompt: replenishmentTaskPrompt,
                    prompt: agentSystemPrompt + "\n\n" + replenishmentTaskPrompt,
                    scope: scope,
                    generatedAt: dashboardData.generatedAt || "",
                    dateRange: { start: els.startDate.value, endExclusive: els.endDate.value },
                    totals: summarize(scopedRows),
                    items: buildReplenishmentInput(scopedRows),
                    rows: scopedRows.slice(0, 1500)
                };

                var headers = { "Content-Type": "application/json" };
                if (agentSettings.apiKey && agentSettings.apiKeyHeader) {
                    headers[agentSettings.apiKeyHeader] = (agentSettings.apiKeyPrefix || "") + agentSettings.apiKey;
                }

                var controller = new AbortController();
                var timeout = window.setTimeout(function () { controller.abort(); }, agentSettings.timeoutMs || 30000);
                return fetch(agentSettings.endpoint, {
                    method: agentSettings.method || "POST",
                    headers: headers,
                    body: JSON.stringify(payload),
                    signal: controller.signal
                }).then(function (response) {
                    return response.text().then(function (text) {
                        window.clearTimeout(timeout);
                        if (!response.ok) {
                            throw new Error("HTTP " + response.status + " " + text.slice(0, 120));
                        }
                        return formatExternalAgentResponse(text, payload.items);
                    });
                });
            }

            function buildReplenishmentInput(scopedRows) {
                var startDate = parseDate(els.startDate.value);
                var endDate = parseDate(els.endDate.value);
                var periodDays = startDate && endDate && endDate > startDate
                    ? Math.max(1, Math.round((endDate - startDate) / 86400000))
                    : null;
                var groups = {};

                scopedRows.forEach(function (row) {
                    var key = [row.name, row.spec, row.batch].join("\u001f");
                    if (!groups[key]) {
                        groups[key] = {
                            item_name: row.name || "",
                            spec: row.spec || "",
                            batch: row.batch || "",
                            current_surplus: 0,
                            period_dispense: 0,
                            period_inbound: 0,
                            period_return: 0,
                            latest_month: "",
                            _months: {}
                        };
                    }

                    var item = groups[key];
                    item.period_dispense += row.dispense;
                    item.period_inbound += row.inbound;
                    item.period_return += row.returnQty;
                    if (!item._months[row.month]) {
                        item._months[row.month] = { inbound: 0, dispense: 0, returnQty: 0, surplus: row.surplus };
                    }
                    item._months[row.month].inbound += row.inbound;
                    item._months[row.month].dispense += row.dispense;
                    item._months[row.month].returnQty += row.returnQty;
                    item._months[row.month].surplus = row.surplus;
                    if (!item.latest_month || row.month >= item.latest_month) {
                        item.latest_month = row.month;
                        item.current_surplus = row.surplus;
                    }
                });

                return Object.keys(groups).map(function (key) {
                    var item = groups[key];
                    var months = Object.keys(item._months).sort();
                    var latestMonth = months[months.length - 1] || "";
                    var previousMonth = months.length > 1 ? months[months.length - 2] : "";
                    var latestStats = latestMonth ? item._months[latestMonth] : null;
                    var previousStats = previousMonth ? item._months[previousMonth] : null;
                    item.period_days = periodDays;
                    item.near7_avg_daily_consumption = null;
                    item.period_avg_daily_consumption = periodDays ? round2(item.period_dispense / periodDays) : null;
                    item.estimated_days_to_depletion = item.period_avg_daily_consumption > 0
                        ? (item.current_surplus <= 0 ? 0 : round2(item.current_surplus / item.period_avg_daily_consumption))
                        : null;
                    item.surplus_status = item.current_surplus <= 0 ? "已透支或已耗尽" : "仍有盈余";
                    item.latest_month = latestMonth || item.latest_month;
                    item.previous_month = previousMonth;
                    item.latest_month_dispense = latestStats ? round2(latestStats.dispense) : null;
                    item.latest_month_net_change = latestStats ? round2(latestStats.inbound - latestStats.dispense + latestStats.returnQty) : null;
                    item.surplus_change_from_previous_month = previousStats ? round2(item.current_surplus - previousStats.surplus) : null;
                    item.estimation_basis = "未提供近7日明细，使用当前筛选周期发药数量 / 周期天数估算日均消耗。";
                    delete item._months;
                    return item;
                }).sort(function (a, b) {
                    var left = a.estimated_days_to_depletion == null ? Number.POSITIVE_INFINITY : a.estimated_days_to_depletion;
                    var right = b.estimated_days_to_depletion == null ? Number.POSITIVE_INFINITY : b.estimated_days_to_depletion;
                    return left - right;
                }).slice(0, 500);
            }

            function parseDate(value) {
                if (!value) return null;
                var date = new Date(value + "T00:00:00");
                return Number.isNaN(date.getTime()) ? null : date;
            }

            function formatExternalAgentResponse(text, computedItems) {
                var parsed = normalizeAgentPayload(text);
                if (!parsed) {
                    return "<div class=\"api-note\">" + escapeHtml(text) + "</div>";
                }

                if (Array.isArray(parsed.insights) && !parsed.summary && !parsed.actual_surplus && !parsed.analysis && !parsed.warnings) {
                    return "<ul>" + parsed.insights.map(function (item) {
                        return "<li>" + escapeHtml(String(item)) + "</li>";
                    }).join("") + "</ul>";
                }

                return buildFormattedAgentHtml(parsed, computedItems || []);
            }

            function normalizeAgentPayload(value) {
                var parsed = value;
                for (var i = 0; i < 5; i++) {
                    if (typeof parsed === "string") {
                        var text = parsed.trim();
                        if (!text) return null;
                        var parsedText = parseJsonCandidate(text);
                        if (parsedText) {
                            parsed = parsedText;
                            continue;
                        }
                        return { summary: stripJsonLikeNoise(text) };
                    }

                    if (parsed && typeof parsed === "object") {
                        var nested = parsed.summary || parsed.result || parsed.output_text || parsed.message;
                        if (typeof nested === "string") {
                            var parsedNested = parseJsonCandidate(nested);
                            if (parsedNested && hasAgentResultShape(parsedNested)) {
                                parsed = parsedNested;
                                continue;
                            }
                        }
                    }
                    break;
                }

                return parsed && typeof parsed === "object" ? parsed : null;
            }

            function parseJsonCandidate(value) {
                var text = String(value || "").trim();
                if (!text) return null;

                text = text.replace(/^```json\s*/i, "").replace(/^```\s*/i, "").replace(/```\s*$/i, "").trim();

                try {
                    return JSON.parse(text);
                } catch (error) {
                }

                var objectText = extractFirstJsonObject(text);
                if (objectText) {
                    try {
                        return JSON.parse(objectText);
                    } catch (error) {
                    }
                }

                return null;
            }

            function extractFirstJsonObject(text) {
                var start = String(text || "").indexOf("{");
                if (start < 0) return "";

                var inString = false;
                var escaped = false;
                var depth = 0;
                for (var i = start; i < text.length; i++) {
                    var ch = text.charAt(i);
                    if (escaped) {
                        escaped = false;
                        continue;
                    }

                    if (ch === "\\" && inString) {
                        escaped = true;
                        continue;
                    }

                    if (ch === "\"") {
                        inString = !inString;
                        continue;
                    }

                    if (inString) continue;

                    if (ch === "{") {
                        depth++;
                    } else if (ch === "}") {
                        depth--;
                        if (depth === 0) {
                            return text.slice(start, i + 1);
                        }
                    }
                }

                return "";
            }

            function hasAgentResultShape(value) {
                return value && typeof value === "object" &&
                    (Object.prototype.hasOwnProperty.call(value, "summary") ||
                        Object.prototype.hasOwnProperty.call(value, "actual_surplus") ||
                        Object.prototype.hasOwnProperty.call(value, "analysis") ||
                        Object.prototype.hasOwnProperty.call(value, "warnings"));
            }

            function stripJsonLikeNoise(value) {
                var text = String(value || "").trim();
                if (text.indexOf("{") >= 0 && text.indexOf("\"summary\"") >= 0) {
                    return "";
                }
                return text;
            }

            function looksLikeJson(value) {
                value = String(value || "").trim();
                return (value.charAt(0) === "{" && value.charAt(value.length - 1) === "}")
                    || (value.charAt(0) === "[" && value.charAt(value.length - 1) === "]");
            }

            function buildFormattedAgentHtml(parsed, computedItems) {
                var blocks = [];
                blocks.push("<p><strong>实际盈余数据：</strong></p>");
                blocks.push(buildActualSurplusList(parsed.actual_surplus, computedItems));

                var warnings = Array.isArray(parsed.warnings) ? parsed.warnings : [];
                if (!warnings.length) {
                    warnings = buildComputedWarnings(computedItems);
                }

                var summary = typeof parsed.summary === "string" ? stripJsonLikeNoise(parsed.summary) : "";
                if (!summary) {
                    summary = buildComputedSummary(computedItems, warnings);
                }
                if (summary && !looksLikeJson(summary)) {
                    blocks.push("<p><strong>总体判断：</strong>" + escapeHtml(summary) + "</p>");
                }

                var analysis = normalizeTextArray(parsed.analysis || parsed.trend_analysis || parsed.predictions);
                if (analysis.length) {
                    blocks.push("<p><strong>趋势与预测判断：</strong></p>");
                    blocks.push("<ul>" + analysis.map(function (sentence) {
                        return "<li>" + escapeHtml(sentence) + "</li>";
                    }).join("") + "</ul>");
                }

                blocks.push("<p><strong>风险与建议：</strong></p>");
                if (warnings.length) {
                    blocks.push("<ul>" + warnings.map(function (warning) {
                        return "<li>" + formatWarningSentence(warning) + "</li>";
                    }).join("") + "</ul>");
                } else {
                    blocks.push("<p>基于当前筛选周期的实际盈余和消耗速度，暂未识别到预计 7 天内耗尽的断供风险；建议继续跟踪最新月消耗变化，并复核低消耗高盈余批次是否存在库存积压。</p>");
                }

                return blocks.join("");
            }

            function buildComputedSummary(computedItems, warnings) {
                var items = computedItems || [];
                if (!items.length) {
                    return "当前筛选范围没有可计算的库存盈余数据，无法形成可靠的补货判断。";
                }

                var totalSurplus = items.reduce(function (sum, item) {
                    return sum + Number(item.current_surplus || 0);
                }, 0);
                var stockoutCount = (warnings || []).filter(function (warning) {
                    return warning.issue_type === "断供风险";
                }).length;
                var overstockCount = (warnings || []).filter(function (warning) {
                    return warning.issue_type === "库存积压";
                }).length;

                return "当前筛选范围共 " + items.length + " 个批次，合计实际盈余 " + formatNumber(totalSurplus) +
                    "；其中 " + stockoutCount + " 个批次存在断供风险，" + overstockCount +
                    " 个批次存在库存覆盖偏长或积压迹象。";
            }

            function buildComputedWarnings(computedItems) {
                var warnings = [];
                (computedItems || []).forEach(function (item) {
                    if (!item) return;
                    var exhausted = item.current_surplus <= 0;
                    var shortDays = item.estimated_days_to_depletion != null && item.estimated_days_to_depletion <= 7;
                    var overstock = item.current_surplus > 0 &&
                        ((item.estimated_days_to_depletion != null && item.estimated_days_to_depletion >= 180) ||
                            Number(item.period_dispense || 0) === 0);
                    var daysText = item.estimated_days_to_depletion == null ? "无法计算" : formatNumber(item.estimated_days_to_depletion) + "天";

                    if (exhausted || shortDays) {
                        warnings.push({
                            item_name: item.item_name || "-",
                            spec: item.spec || "",
                            batch: item.batch || "",
                            issue_type: "断供风险",
                            description: exhausted
                                ? "当前实际盈余为 " + formatNumber(item.current_surplus) + "，已透支或已耗尽；本周期发药 " + formatNumber(item.period_dispense) + "，周期日均消耗 " + formatNullableNumber(item.period_avg_daily_consumption) + "。"
                                : "当前实际盈余为 " + formatNumber(item.current_surplus) + "，按当前消耗速度预计可用 " + daysText + "，低于 7 天预警线。",
                            recommendation: exhausted
                                ? "立即复核账实一致性和批次领用记录，确认临床仍需使用时优先补货或跨科室调拨。"
                                : "纳入补货清单，并结合最新月发药量校准安全库存。"
                        });
                    } else if (overstock) {
                        warnings.push({
                            item_name: item.item_name || "-",
                            spec: item.spec || "",
                            batch: item.batch || "",
                            issue_type: "库存积压",
                            description: "当前实际盈余为 " + formatNumber(item.current_surplus) + "，本周期发药 " + formatNumber(item.period_dispense) + "，预计可用 " + daysText + "，库存覆盖明显偏长。",
                            recommendation: "暂停或降低该批次补货优先级，优先清理近效期库存，并核对是否存在规格替代或批次拆分导致的低消耗。"
                        });
                    }
                });

                return warnings.slice(0, 12);
            }

            function buildActualSurplusList(actualSurplus, computedItems) {
                var sentences = [];
                if (Array.isArray(actualSurplus)) {
                    actualSurplus.forEach(function (item) {
                        if (item && item.sentence) {
                            sentences.push(String(item.sentence));
                        }
                    });
                }

                if (!sentences.length) {
                    var limit = Math.min(computedItems.length, 12);
                    for (var i = 0; i < limit; i++) {
                        sentences.push(buildComputedSurplusSentence(computedItems[i]));
                    }
                    if (computedItems.length > limit) {
                        sentences.push("其余 " + (computedItems.length - limit) + " 个批次未展开，建议在明细表中按预计可用天数继续筛查。");
                    }
                }

                if (!sentences.length) {
                    sentences.push("当前筛选范围没有可计算的盈余数据。");
                }

                return "<ul>" + sentences.map(function (sentence) {
                    return "<li>" + escapeHtml(sentence) + "</li>";
                }).join("") + "</ul>";
            }

            function buildComputedSurplusSentence(item) {
                if (!item) return "当前筛选范围没有可计算的盈余数据。";
                var label = [item.item_name || "-", item.spec || "-", item.batch ? "批号" + item.batch : "无批号"].join(" / ");
                var days = item.estimated_days_to_depletion == null
                    ? "无法计算"
                    : formatNumber(item.estimated_days_to_depletion) + " 天";
                var status = item.current_surplus <= 0
                    ? "当前已透支或已耗尽，预计可用 0 天"
                    : "当前实际盈余为 " + formatNumber(item.current_surplus) + "，预计可用 " + days;
                var trend = item.surplus_change_from_previous_month == null
                    ? "暂无上月对比"
                    : "较上月变化 " + formatNumber(item.surplus_change_from_previous_month);
                return label + "：" + status + "；本周期发药 " + formatNumber(item.period_dispense) +
                    "，周期日均消耗 " + formatNullableNumber(item.period_avg_daily_consumption) +
                    "；最新月发药 " + formatNullableNumber(item.latest_month_dispense) +
                    "，" + trend + "。";
            }

            function normalizeTextArray(value) {
                if (!value) return [];
                if (Array.isArray(value)) {
                    return value.map(function (item) {
                        if (item == null) return "";
                        if (typeof item === "string") return item;
                        return item.sentence || item.description || JSON.stringify(item);
                    }).filter(function (item) { return String(item).trim(); });
                }
                return [String(value)];
            }

            function formatWarningSentence(warning) {
                if (!warning || typeof warning !== "object") {
                    return escapeHtml(String(warning || ""));
                }

                var item = [warning.item_name || "-", warning.spec || "", warning.batch ? "批号" + warning.batch : ""]
                    .filter(function (part) { return String(part).trim(); })
                    .join(" / ");
                var issue = warning.issue_type || "风险提示";
                var description = warning.description || "";
                var recommendation = warning.recommendation || "";
                return "<strong>" + escapeHtml(item) + "</strong> [" + escapeHtml(issue) + "] " +
                    escapeHtml(description) + (recommendation ? " 建议：" + escapeHtml(recommendation) : "");
            }

            function buildApiNote(text) {
                var suffix = agentSettings.enabled && agentSettings.endpoint
                    ? " 已启用 AgentSettings.js 外部接口。"
                    : " 如需切换为外部 Agent，请编辑 AgentSettings.js。";
                return "<div class=\"api-note\">" + text + suffix + "</div>";
            }

            function findAnomalies(scopedRows) {
                var months = unique(scopedRows.map(function (row) { return row.month; })).sort();
                if (months.length < 2) return [];

                var groups = {};
                scopedRows.forEach(function (row) {
                    var key = [row.name, row.spec, row.batch].join("\u001f");
                    if (!groups[key]) {
                        groups[key] = { label: labelFor(row), byMonth: {}, inbound: 0 };
                    }
                    groups[key].byMonth[row.month] = row.surplus;
                    groups[key].inbound += row.inbound;
                });

                var anomalies = [];
                Object.keys(groups).forEach(function (key) {
                    var group = groups[key];
                    var balances = months.map(function (month) {
                        return Object.prototype.hasOwnProperty.call(group.byMonth, month) ? group.byMonth[month] : null;
                    });
                    var slopes = [];
                    for (var i = 1; i < balances.length; i++) {
                        if (balances[i] !== null && balances[i - 1] !== null) {
                            slopes.push(balances[i] - balances[i - 1]);
                        }
                    }
                    if (slopes.length < 2) return;

                    var previous = slopes.slice(0, -1);
                    var previousAverage = previous.reduce(function (sum, value) { return sum + value; }, 0) / previous.length;
                    var lastSlope = slopes[slopes.length - 1];
                    var threshold = Math.max(Math.abs(previousAverage) * 0.5, 1);
                    if (lastSlope < 0 && lastSlope < previousAverage - threshold) {
                        anomalies.push({
                            label: group.label,
                            lastSlope: lastSlope,
                            previousAverage: previousAverage,
                            severity: Math.abs(lastSlope - previousAverage)
                        });
                    }
                });

                anomalies.sort(function (a, b) { return b.severity - a.severity; });
                return anomalies;
            }

            function aggregateByMonth(scopedRows) {
                var map = {};
                scopedRows.forEach(function (row) {
                    if (!map[row.month]) {
                        map[row.month] = { inbound: 0, dispense: 0, returnQty: 0, surplus: 0 };
                    }
                    map[row.month].inbound += row.inbound;
                    map[row.month].dispense += row.dispense;
                    map[row.month].returnQty += row.returnQty;
                    map[row.month].surplus += row.surplus;
                });

                var months = Object.keys(map).sort();

                return {
                    months: months,
                    inbound: months.map(function (month) { return round2(map[month].inbound); }),
                    dispense: months.map(function (month) { return round2(map[month].dispense); }),
                    returnQty: months.map(function (month) { return round2(map[month].returnQty); }),
                    surplus: months.map(function (month) { return round2(map[month].surplus); }),
                    cumulativeSurplus: months.map(function (month) { return round2(map[month].surplus); })
                };
            }

            function summarize(scopedRows) {
                var latestByGroup = {};
                var total = scopedRows.reduce(function (summary, row) {
                    summary.inbound += row.inbound;
                    summary.dispense += row.dispense;
                    summary.returnQty += row.returnQty;
                    var key = [row.name, row.spec, row.batch].join("\u001f");
                    if (!latestByGroup[key] || row.month > latestByGroup[key].month) {
                        latestByGroup[key] = row;
                    }
                    return summary;
                }, { inbound: 0, dispense: 0, returnQty: 0, surplus: 0 });

                Object.keys(latestByGroup).forEach(function (key) {
                    total.surplus += latestByGroup[key].surplus;
                });
                return total;
            }

            function normalizeRows(inputRows) {
                return inputRows.map(function (row) {
                    return {
                        month: String(row.month || ""),
                        monthDate: String(row.monthDate || (row.month ? row.month + "-01" : "")),
                        name: String(row.name || ""),
                        spec: String(row.spec || ""),
                        batch: String(row.batch || ""),
                        inbound: Number(row.inbound || 0),
                        dispense: Number(row.dispense || 0),
                        returnQty: Number(row.returnQty || 0),
                        surplus: Number(row.surplus || 0)
                    };
                }).sort(function (a, b) {
                    return a.month.localeCompare(b.month) ||
                        localeSort(a.name, b.name) ||
                        localeSort(a.spec, b.spec) ||
                        localeSort(a.batch, b.batch);
                });
            }

            function labelFor(row) {
                return (row.name || "(空名称)") + " / " + (row.spec || "-") + " / " + (row.batch || "-");
            }

            function unique(values) {
                var seen = {};
                var result = [];
                values.forEach(function (value) {
                    var key = String(value);
                    if (!Object.prototype.hasOwnProperty.call(seen, key)) {
                        seen[key] = true;
                        result.push(value);
                    }
                });
                return result;
            }

            function meanAndStd(values) {
                var mean = values.reduce(function (sum, value) { return sum + value; }, 0) / values.length;
                var variance = values.reduce(function (sum, value) {
                    var diff = value - mean;
                    return sum + diff * diff;
                }, 0) / values.length;
                return { mean: mean, std: Math.sqrt(variance) };
            }

            function maxBy(items, field) {
                return items.reduce(function (best, item) {
                    return item[field] > best[field] ? item : best;
                }, items[0]);
            }

            function addMonths(dateString, count) {
                var date = new Date(dateString + "T00:00:00");
                date.setMonth(date.getMonth() + count);
                return date.getFullYear() + "-" + pad(date.getMonth() + 1) + "-" + pad(date.getDate());
            }

            function pad(value) {
                return String(value).padStart(2, "0");
            }

            function formatNumber(value) {
                return round2(value).toLocaleString("zh-CN", { maximumFractionDigits: 2 });
            }

            function formatNullableNumber(value) {
                return value == null || Number.isNaN(Number(value)) ? "无法计算" : formatNumber(value);
            }

            function round2(value) {
                return Math.round((Number(value) + Number.EPSILON) * 100) / 100;
            }

            function localeSort(a, b) {
                return String(a || "").localeCompare(String(b || ""), "zh-CN");
            }

            function escapeHtml(value) {
                return String(value == null ? "" : value)
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;")
                    .replace(/"/g, "&quot;")
                    .replace(/'/g, "&#39;");
            }

            document.addEventListener("DOMContentLoaded", init);
        })();
    </script>
</body>
</html>
